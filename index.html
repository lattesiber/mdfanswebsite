<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murder Drones Fans Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            font-size: 2.5rem;
            color: #ff8c00;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        button, a.btn {
            background-color: #ff8c00;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3);
        }
        button:hover, a.btn:hover {
            background-color: #e07b00;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.5);
        }
        #content-box {
            display: none;
            max-width: 550px;
            margin: 0 auto;
            background-color: #2a2a2a;
            border: 2px solid #ff8c00;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #content-box h2 {
            margin-top: 0;
            color: #ff8c00;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .data-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        .data-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #333;
            text-decoration: none;
            color: white;
            transition: background 0.2s ease;
        }
        .data-item:hover {
            background-color: #333;
            border-radius: 8px;
        }
        .data-item:last-child {
            border-bottom: none;
        }
        .item-img {
            width: 50px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid #ff8c00;
        }
        .manager-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
            text-align: left;
        }
        .loading {
            color: #aaa;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>murder drones fans website</h1>

    <div class="btn-container">
        <button onclick="fetchManagers()">Managers</button>
        <button onclick="fetchProjects()">Projects</button>
        <a href="https://scratch.mit.edu/studios/51707858/" target="_blank" class="btn">Scratch</a>
    </div>

    <div id="content-box">
        <h2 id="box-title">Studio Content</h2>
        <div id="box-content"></div>
    </div>

    <script>
        const box = document.getElementById('content-box');
        const title = document.getElementById('box-title');
        const content = document.getElementById('box-content');

        // MANAGERS ÇEKME FONKSİYONU
        async function fetchManagers() {
            box.style.display = 'block';
            title.innerText = "Studio Managers";
            content.innerHTML = '<p class="loading">Loading managers...</p>';

            try {
                const response = await fetch('/api/scratch');
                if (!response.ok) throw new Error('API Error');

                const curators = await response.json();
                const managers = curators.filter(user => user.is_manager === true);

                if (managers.length === 0) {
                    content.innerHTML = '<p>No managers found.</p>';
                    return;
                }

                let listHtml = '<ul class="data-list">';
                managers.forEach(manager => {
                    listHtml += `
                        <div class="data-item">
                            <img class="item-img manager-avatar" src="${manager.profile.images['90x90']}" alt="${manager.username}">
                            <span class="item-name">${manager.username}</span>
                        </div>
                    `;
                });
                listHtml += '</ul>';
                content.innerHTML = listHtml;

            } catch (error) {
                console.error(error);
                content.innerHTML = '<p style="color: #ff4444;">Failed to load managers.</p>';
            }
        }

        // PROJELERİ ÇEKME FONKSİYONU
        async function fetchProjects() {
            box.style.display = 'block';
            title.innerText = "Studio Projects";
            content.innerHTML = '<p class="loading">Loading projects...</p>';

            try {
                const response = await fetch('/api/projects');
                if (!response.ok) throw new Error('API Error');

                const projects = await response.json();

                if (projects.length === 0) {
                    content.innerHTML = '<p>No projects found in this studio.</p>';
                    return;
                }

                let listHtml = '<ul class="data-list">';
                projects.forEach(project => {
                    listHtml += `
                        <a href="https://scratch.mit.edu/projects/${project.id}" target="_blank" class="data-item">
                            <img class="item-img" src="${project.image}" alt="${project.title}">
                            <span class="item-name">${project.title}</span>
                        </a>
                    `;
                });
                listHtml += '</ul>';
                content.innerHTML = listHtml;

            } catch (error) {
                console.error(error);
                content.innerHTML = '<p style="color: #ff4444;">Failed to load projects.</p>';
            }
        }
    </script>
</body>
</html>
